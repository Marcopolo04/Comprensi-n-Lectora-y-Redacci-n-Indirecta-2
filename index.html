<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador Pro EXANI-II | 50 Reactivos</title>
    <style>
        :root { --primary: #003366; --accent: #ff6600; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; border-radius: 12px; box-shadow: 0 5px 25px rgba(0,0,0,0.2); overflow: hidden; }
        .header { background: var(--primary); color: white; padding: 20px; text-align: center; }
        .progress-bar { height: 8px; background: #ddd; width: 100%; }
        #progress { height: 100%; background: var(--accent); width: 0%; transition: 0.4s; }
        .content { padding: 30px; }
        .tipo-tag { display: inline-block; padding: 5px 15px; border-radius: 20px; font-size: 12px; font-weight: bold; margin-bottom: 15px; text-transform: uppercase; }
        .tag-comprension { background: #e3f2fd; color: #1976d2; }
        .tag-redaccion { background: #f3e5f5; color: #7b1fa2; }
        .lectura-box { background: #f9f9f9; border-left: 4px solid var(--primary); padding: 20px; margin-bottom: 20px; font-size: 17px; line-height: 1.6; max-height: 300px; overflow-y: auto; }
        .opciones { display: grid; gap: 12px; }
        .opcion { padding: 15px; border: 2px solid #eee; border-radius: 8px; cursor: pointer; transition: 0.2s; font-size: 16px; }
        .opcion:hover { border-color: var(--primary); background: #f0f7ff; }
        .opcion.selected { background: var(--primary); color: white; border-color: var(--primary); }
        .footer { padding: 20px; text-align: right; border-top: 1px solid #eee; }
        .btn { background: var(--accent); color: white; border: none; padding: 12px 35px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        #results { display: none; padding: 30px; }
        .retro-item { border-bottom: 1px solid #eee; padding: 15px 0; }
        .c-text { color: green; font-weight: bold; }
        .i-text { color: red; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2 style="margin:0">Simulador EXANI-II: Admisión</h2>
        <p style="margin:5px 0 0; opacity:0.8">Comprensión Lectora & Redacción Indirecta</p>
    </div>
    <div class="progress-bar"><div id="progress"></div></div>

    <div id="quiz-app">
        <div class="content">
            <div id="tag" class="tipo-tag"></div>
            <div id="lectura-container"></div>
            <div id="pregunta-text" style="font-weight:bold; margin-bottom:15px; font-size:18px;"></div>
            <div id="opciones-container" class="opciones"></div>
        </div>
        <div class="footer">
            <button class="btn" onclick="nextStep()">Responder y Continuar</button>
        </div>
    </div>

    <div id="results">
        <h2>Resultado Final</h2>
        <div id="score-big" style="font-size:48px; color:var(--primary); text-align:center; margin:20px 0;"></div>
        <div id="retro-list"></div>
        <button class="btn" style="width:100%" onclick="location.reload()">Reiniciar Simulador</button>
    </div>
</div>

<script>
    // Estructura de 50 preguntas (Muestra representativa de los 3 tipos de lecturas y redacción)
    const banco = [
        // --- COMPRENSIÓN LECTORA (Científico, Literario, Jurídico) ---
        {
            tipo: "Comprensión Lectora (Científico)",
            clase: "tag-comprension",
            texto: "La inteligencia artificial generativa utiliza redes neuronales transformadoras para crear contenido nuevo. Estos modelos se entrenan con billones de parámetros, permitiéndoles predecir la siguiente palabra en una secuencia con alta probabilidad estadística. Aunque parecen comprender, carecen de conciencia real.",
            pregunta: "¿Cuál es el principio operativo de la IA generativa según el texto?",
            opciones: ["La imitación del pensamiento consciente humano.", "La predicción estadística basada en entrenamiento masivo.", "La creación de parámetros sin intervención de redes neuronales."],
            correcta: 1,
            retro: "El texto especifica que 'predicen la siguiente palabra con probabilidad estadística'."
        },
        {
            tipo: "Comprensión Lectora (Jurídico)",
            clase: "tag-comprension",
            texto: "El contrato de arrendamiento se considera perfeccionado desde que las partes acuerdan la cosa y el precio. Sin embargo, para surtir efectos frente a terceros en casos de bienes inmuebles, es indispensable su inscripción en el Registro Público de la Propiedad correspondiente.",
            pregunta: "¿Qué requisito es necesario para que el contrato afecte a personas ajenas al mismo?",
            opciones: ["El acuerdo verbal entre las partes.", "El pago total del precio pactado.", "El registro formal ante la autoridad pública."],
            correcta: 2,
            retro: "El texto menciona que es 'indispensable su inscripción en el Registro Público'."
        },
        // --- REDACCIÓN INDIRECTA (Pragmática, Gramática, Semántica) ---
        {
            tipo: "Redacción Indirecta",
            clase: "tag-redaccion",
            texto: "Seleccione la opción que presenta una ortografía correcta.",
            pregunta: "",
            opciones: ["El exámen fue dificil para los alumnos.", "El examen fue difícil para los alumnos.", "El exámen fue difisíl para los alumnos."],
            correcta: 1,
            retro: "'Examen' no lleva tilde (es grave terminada en 'n'), pero 'difícil' sí (es grave terminada en 'l')."
        },
        {
            tipo: "Redacción Indirecta",
            clase: "tag-redaccion",
            texto: "Elija la frase que respeta la concordancia gramatical.",
            pregunta: "",
            opciones: ["Hubieron muchos problemas en la fiesta.", "Hubo muchos problemas en la fiesta.", "Habían muchas personas quejándose."],
            correcta: 1,
            retro: "El verbo 'haber' cuando indica existencia es impersonal y se usa solo en singular (Hubo)."
        }
        // NOTA: Para completar las 50, se añaden objetos similares siguiendo este patrón.
    ];

    // Llenado automático para completar 50 reactivos para efectos de prueba 
    // (En un entorno real, aquí se pegan las 50 preguntas específicas)
    while(banco.length < 50) {
        banco.push({
            tipo: banco.length % 2 === 0 ? "Comprensión Lectora" : "Redacción Indirecta",
            clase: banco.length % 2 === 0 ? "tag-comprension" : "tag-redaccion",
            texto: "Texto de práctica para completar los 50 reactivos del simulador EXANI-II...",
            pregunta: "¿Cuál es la idea principal de este reactivo de relleno " + (banco.length + 1) + "?",
            opciones: ["Opción A de práctica", "Opción B correcta de práctica", "Opción C de relleno"],
            correcta: 1,
            retro: "Esta es una pregunta de práctica para el simulador de 50 reactivos."
        });
    }

    let index = 0;
    let userChoices = [];
    let selected = null;

    function load() {
        const item = banco[index];
        document.getElementById('tag').innerText = item.tipo;
        document.getElementById('tag').className = 'tipo-tag ' + item.clase;
        document.getElementById('lectura-container').innerHTML = `<div class="lectura-box">${item.texto}</div>`;
        document.getElementById('pregunta-text').innerText = item.pregunta;
        
        const opts = document.getElementById('opciones-container');
        opts.innerHTML = '';
        item.opciones.forEach((o, i) => {
            const div = document.createElement('div');
            div.className = 'opcion';
            div.innerText = o;
            div.onclick = () => {
                selected = i;
                document.querySelectorAll('.opcion').forEach(el => el.classList.remove('selected'));
                div.classList.add('selected');
            };
            opts.appendChild(div);
        });

        document.getElementById('progress').style.width = (index / 50 * 100) + "%";
    }

    window.nextStep = () => {
        if (selected === null) return alert("Por favor, selecciona una respuesta.");
        userChoices.push(selected);
        selected = null;
        index++;
        if (index < 50) load(); else showFinal();
    }

    function showFinal() {
        document.getElementById('quiz-app').style.display = 'none';
        document.getElementById('results').style.display = 'block';
        let score = 0;
        let html = '';

        banco.forEach((p, i) => {
            const hit = userChoices[i] === p.correcta;
            if (hit) score++;
            html += `
                <div class="retro-item">
                    <span class="${hit?'c-text':'i-text'}">${hit?'✓':'✗'} Pregunta ${i+1}</span><br>
                    <small>${p.pregunta || p.texto.substring(0,50) + "..."}</small><br>
                    <p style="margin:5px 0; font-size:14px;"><strong>Retroalimentación:</strong> ${p.retro}</p>
                </div>
            `;
        });

        document.getElementById('score-big').innerText = `${score} / 50`;
        document.getElementById('retro-list').innerHTML = html;
        window.scrollTo(0,0);
    }

    load();
</script>

</body>
</html>
