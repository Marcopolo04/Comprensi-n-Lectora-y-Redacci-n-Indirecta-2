<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador Oficial EXANI-II | 25 Reactivos</title>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        :root { --primary: #004b93; --secondary: #00a1e4; --accent: #ff6600; --bg: #f4f7f9; }
        body { font-family: 'Montserrat', sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        .container { max-width: 850px; margin: 20px auto; background: white; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: var(--primary); color: white; padding: 20px; text-align: center; position: relative; }
        #timer { position: absolute; right: 20px; top: 25px; background: rgba(0,0,0,0.3); padding: 5px 12px; border-radius: 20px; font-weight: bold; font-family: monospace; }
        .progress-container { background: #e0e0e0; height: 8px; }
        #progress-bar { background: var(--secondary); height: 100%; width: 0%; transition: 0.4s; }
        .quiz-body, .form-body { padding: 25px; }
        .badge { padding: 4px 10px; border-radius: 4px; font-size: 11px; font-weight: bold; margin-bottom: 15px; display: inline-block; text-transform: uppercase; }
        .comprension { background: #e3f2fd; color: #0d47a1; }
        .redaccion { background: #fff3e0; color: #e65100; }
        .lectura-box { background: #fafafa; border: 1px solid #eee; padding: 20px; border-radius: 8px; line-height: 1.6; margin-bottom: 20px; font-size: 15px; white-space: pre-line; max-height: 300px; overflow-y: auto; }
        .opcion { border: 2px solid #edeff2; padding: 12px 15px; border-radius: 8px; cursor: pointer; transition: 0.2s; margin-bottom: 8px; }
        .opcion.active { border-color: var(--primary); background: #e3f2fd; font-weight: 600; }
        .btn { background: var(--accent); color: white; border: none; padding: 15px; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; width: 100%; transition: 0.3s; }
        input { width: 100%; box-sizing: border-box; padding: 12px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 6px; font-family: inherit; }
        #quiz-ui, #results { display: none; }
        .retro-card { border-left: 5px solid #ccc; padding: 15px; margin-bottom: 15px; background: #fff; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2 id="title-main" style="margin:0; font-size: 18px;">Registro de Aspirante</h2>
        <div id="timer">40:00</div>
    </div>
    <div class="progress-container"><div id="progress-bar"></div></div>

    <div id="form-ui" class="form-body">
        <p>Completa tus datos para iniciar. Al finalizar, tus resultados se guardarán automáticamente.</p>
        <label>Nombre Completo:</label>
        <input type="text" id="user_name" placeholder="Ej. Juan Pérez" required>
        <label>Correo Electrónico:</label>
        <input type="email" id="user_email" placeholder="juan@ejemplo.com" required>
        <button class="btn" onclick="startQuiz()">Comenzar Examen</button>
    </div>

    <div id="quiz-ui" class="quiz-body">
        <div id="tag" class="badge"></div>
        <div id="lectura" class="lectura-box"></div>
        <div id="pregunta" style="font-weight:700; margin-bottom:15px; font-size: 17px;"></div>
        <div id="opciones-ui"></div>
        <button class="btn" style="margin-top:20px" onclick="handleNext()">Siguiente Pregunta</button>
    </div>

    <div id="results" class="quiz-body">
        <div style="text-align:center">
            <h2 id="final-score-text"></h2>
            <p id="db-status">Sincronizando con la base de datos...</p>
        </div>
        <div id="feedback-list"></div>
        <button class="btn" onclick="location.reload()">Reiniciar Simulador</button>
    </div>
</div>

<script>
const DATABASE_URL = "https://script.google.com/macros/s/AKfycbyhntTSpvcmvlRYBo9AutHDYF-Z5DG3LjF9BIqisW4zqptzhxbuafqm0DpXVQ3dWn8p/exec";

const banco = [
    { t: "Comprensión (Científico)", c: "comprension", l: "El telescopio James Webb detectó CO2 en un exoplaneta a 700 años luz, demostrando su capacidad técnica.", p: "¿Cuál es la idea principal?", o: ["Distancia al planeta.", "Capacidad técnica del Webb.", "Vida inteligente."], r: 1, fb: "Resalta la capacidad técnica del observatorio." },
    { t: "Comprensión (Literario)", c: "comprension", l: "—No me pises —dijo la sombra—. No me pises, que me duele.", p: "¿Qué figura retórica predomina?", o: ["Hipérbole", "Metonimia", "Prosopopeya"], r: 2, fb: "Atribuir voz a una sombra es prosopopeya." },
    { t: "Comprensión (Jurídico)", c: "comprension", l: "Todo contrato legal es ley para las partes y solo se invalida por mutuo acuerdo o causas legales.", p: "¿Cómo se invalida?", o: ["Voluntad de uno.", "Mutuo acuerdo o causas legales.", "Falta de pago."], r: 1, fb: "El texto limita la invalidez al acuerdo mutuo o ley." },
    { t: "Comprensión (Jurídico)", c: "comprension", l: "La patria potestad se ejerce sobre hijos. En separación, se decide por convenio o juez, según el interés superior del menor.", p: "¿Qué rige la decisión?", o: ["Beneficio de padres.", "Prioridad materna.", "Interés superior del menor."], r: 2, fb: "Se cita explícitamente el 'interés superior del menor'." },
    { t: "Comprensión (Literario)", c: "comprension", l: "Santiago sentía el sedal. 'Pez', pensó, 'te respeto, pero te mataré antes de que acabe el día'.", p: "¿Qué manifiesta?", o: ["Odio.", "Afecto y determinación.", "Indiferencia."], r: 1, fb: "Une el respeto con su deber de pescador." },
    { t: "Redacción Indirecta", c: "redaccion", l: "Elija el error de concordancia.", p: "", o: ["Mayoría aprobó.", "El grupo llegaron tarde.", "Ellos entregaron."], r: 1, fb: "'El grupo' es singular; debe ser 'llegó'." },
    { t: "Redacción Indirecta", c: "redaccion", l: "Complete: 'Estudió mucho, ___ no logró la beca; ___, seguirá intentando'.", p: "", o: ["pero - sin embargo", "aunque - por lo tanto", "mas - no obstante"], r: 2, fb: "'Mas' (pero) y 'no obstante' encajan lógicamente." },
    { t: "Redacción Indirecta", c: "redaccion", l: "Puntuación correcta.", p: "", o: ["Aunque estaba cansado, terminó.", "Aunque estaba cansado terminó.", "Aunque, cansado terminó."], r: 0, fb: "Coma obligatoria tras subordinada inicial." },
    { t: "Redacción Indirecta", c: "redaccion", l: "Ortografía correcta.", p: "", o: ["Decisión exahustiva.", "Decisión exhaustiva.", "Desición exhaustiva."], r: 1, fb: "'Exhaustiva' con h y 'decisión' con c-s." },
    { t: "Redacción Indirecta", c: "redaccion", l: "Evite pleonasmo.", p: "", o: ["Subió arriba.", "Entró adentro.", "Presentó pruebas."], r: 2, fb: "Las otras son redundantes." },
    { t: "Redacción Indirecta", c: "redaccion", l: "Uso de 'haya'.", p: "", o: ["Espero que haiga.", "Espero que haya.", "Espero que haygan."], r: 1, fb: "'Haya' es la forma correcta." },
    { t: "Redacción Indirecta", c: "redaccion", l: "Acentuación.", p: "", o: ["¿No se por que vino?", "Me pregunto por qué vino.", "Dime como."], r: 1, fb: "'Por qué' interrogativo indirecto lleva tilde." },
    { t: "Redacción Indirecta", c: "redaccion", l: "Pronombre correcto.", p: "", o: ["Le dije a ellos.", "Les dije a ellos.", "Se los dije."], r: 1, fb: "'Les' concuerda con 'ellos'." },
    { t: "Redacción Indirecta", c: "redaccion", l: "Uso de 'porqué'.", p: "", o: ["El porqué de su actitud.", "Vino porqué quería.", "No fue por qué."], r: 0, fb: "'Porqué' sustantivo lleva tilde." },
    { t: "Redacción Indirecta", c: "redaccion", l: "Impersonal.", p: "", o: ["Habían invitados.", "Hubo invitados.", "Hicieron frío."], r: 1, fb: "Haber de existencia siempre singular." },
    { t: "Comprensión (Científico)", c: "comprension", l: "El deshielo del permafrost despierta virus latentes milenarios. Científicos advierten riesgos de salud.", p: "¿Qué riesgo adicional menciona?", o: ["Extinción local.", "Patógenos antiguos.", "Nivel del mar."], r: 1, fb: "Menciona virus antiguos que podrían despertar." },
    { t: "Comprensión (Literario)", c: "comprension", l: "El autor dice que su obra es un 'espejo roto' donde cada uno ve algo distinto.", p: "¿Qué metáfora usa?", o: ["Mapa sin brújula.", "Espejo roto.", "Camino sin final."], r: 1, fb: "Cita explícitamente 'espejo roto'." },
    { t: "Comprensión (Jurídico)", c: "comprension", l: "Toda persona tiene derecho a protección de datos, salvo excepciones por seguridad nacional.", p: "¿Es absoluto?", o: ["Sí.", "No, por seguridad nacional.", "Solo el titular los ve."], r: 1, fb: "Existen excepciones legales." },
    { t: "Comprensión (Científico)", c: "comprension", l: "Fotosíntesis artificial busca convertir CO2 en combustible. El reto es la eficiencia catalítica.", p: "¿Obstáculo principal?", o: ["Luz solar.", "Escasez de agua.", "Eficiencia catalítica."], r: 2, fb: "Menciona la eficiencia de catalizadores." },
    { t: "Comprensión (Literario)", c: "comprension", l: "Caminante, no hay camino, se hace camino al andar.", p: "¿Qué sugiere?", o: ["Destino escrito.", "Creación constante.", "Mirar al pasado."], r: 1, fb: "Sostiene que creamos nuestro destino al vivir." },
    { t: "Redacción Indirecta", c: "redaccion", l: "Acentuación.", p: "", o: ["El jóven compró.", "El joven compró.", "El joven compro."], r: 1, fb: "'Joven' es grave terminada en n; sin tilde." },
    { t: "Redacción Indirecta", c: "redaccion", l: "Sino/Si no.", p: "", o: ["No pan sino tortillas.", "No pan si no tortillas.", "Si no vienes."], r: 0, fb: "'Sino' unido contrapone ideas." },
    { t: "Redacción Indirecta", c: "redaccion", l: "Probabilidad.", p: "", o: ["Debes de estudiar.", "Debes estudiar.", "Debe de haber salido."], r: 2, fb: "'Debe de' indica suposición." },
    { t: "Redacción Indirecta", c: "redaccion", l: "Grafías.", p: "", o: ["Herbolaria.", "Exivir.", "Zanahoria."], r: 1, fb: "Se escribe 'Exhibir'." },
    { t: "Redacción Indirecta", c: "redaccion", l: "Voseo.", p: "", o: ["Tú tienes.", "Vos tenés.", "Vos tienes."], r: 1, fb: "La forma correcta es 'Vos tenés'." }
];

let currentIdx = 0, score = 0, userAnswers = [], selectedOption = null, timerInterval;
let userData = { name: "", email: "" };

function startQuiz() {
    userData.name = document.getElementById('user_name').value;
    userData.email = document.getElementById('user_email').value;
    if(!userData.name || !userData.email) return alert("Ingresa tu nombre y correo");
    
    document.getElementById('form-ui').style.display = 'none';
    document.getElementById('quiz-ui').style.display = 'block';
    document.getElementById('title-main').innerText = "EXANI-II en Progreso";
    startTimer(40 * 60);
    renderQuestion();
}

function startTimer(duration) {
    let timer = duration;
    timerInterval = setInterval(() => {
        let minutes = parseInt(timer / 60, 10);
        let seconds = parseInt(timer % 60, 10);
        document.getElementById('timer').textContent = `${minutes}:${seconds < 10 ? '0'+seconds : seconds}`;
        if (--timer < 0) { clearInterval(timerInterval); alert("Tiempo agotado"); showResults(); }
    }, 1000);
}

function renderQuestion() {
    const item = banco[currentIdx];
    document.getElementById('progress-bar').style.width = ((currentIdx + 1) / banco.length * 100) + "%";
    document.getElementById('tag').innerText = item.t;
    document.getElementById('tag').className = 'badge ' + item.c;
    document.getElementById('lectura').innerText = item.l;
    document.getElementById('pregunta').innerText = item.p;
    
    const container = document.getElementById('opciones-ui');
    container.innerHTML = '';
    item.o.forEach((op, i) => {
        const div = document.createElement('div');
        div.className = 'opcion';
        div.innerText = op;
        div.onclick = () => {
            selectedOption = i;
            document.querySelectorAll('.opcion').forEach(d => d.classList.remove('active'));
            div.classList.add('active');
        };
        container.appendChild(div);
    });
}

function handleNext() {
    if (selectedOption === null) return alert("Selecciona una opción");
    userAnswers.push(selectedOption);
    if (selectedOption === banco[currentIdx].r) score++;
    selectedOption = null;
    currentIdx++;
    if (currentIdx < banco.length) renderQuestion(); else showResults();
}

async function showResults() {
    clearInterval(timerInterval);
    document.getElementById('quiz-ui').style.display = 'none';
    document.getElementById('results').style.display = 'block';
    document.getElementById('final-score-text').innerText = `Puntaje: ${score} / ${banco.length}`;
    
    try {
        await fetch(DATABASE_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: userData.name, email: userData.email, score: score, total: banco.length })
        });
        document.getElementById('db-status').innerText = "✓ Resultados guardados exitosamente.";
    } catch (e) {
        document.getElementById('db-status').innerText = "✕ Error al guardar resultados.";
    }

    const list = document.getElementById('feedback-list');
    list.innerHTML = "";
    banco.forEach((p, i) => {
        const isOk = userAnswers[i] === p.r;
        list.innerHTML += `<div class="retro-card" style="border-left-color:${isOk?'#28a745':'#dc3545'}">
            <strong>${i+1}.</strong> ${p.p || p.l.substring(0,40)}...<br>
            <p style="margin:5px 0"><em>Retro:</em> ${p.fb}</p>
        </div>`;
    });
    window.scrollTo(0,0);
}
</script>
</body>
</html>
